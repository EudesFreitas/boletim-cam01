<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasta - Semana 1</title>

  <link rel="stylesheet" href="./css/style.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #222;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .folder-title {
      font-size: 22px;
      margin-bottom: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 15px;
      padding: 8px 12px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <header>
    <h1>📁 Semana 1</h1>
  </header>

  <div class="container">

    <a class="back-btn" href="index.html">⬅ Voltar</a>

    <div class="folder-title">Boletins da Semana 1</div>

    <div class="card" onclick="openBoletim('boletim1.html')">
      📄 Boletim 01 - Introdução
    </div>

    <div class="card" onclick="openBoletim('boletim2.html')">
      📄 Boletim 02 - Continuação
    </div>

    <div class="card" onclick="openBoletim('boletim3.html')">
      📄 Boletim 03 - Final
    </div>

  </div>

  <script>
    /*function openBoletim(page) {
      window.location.href = page;
    }*/
   
  const container = document.querySelector(".container");

  let folders = JSON.parse(localStorage.getItem("folders")) || [];
  let pastaAtual = localStorage.getItem("pastaAtual");

  let pasta = folders[pastaAtual];

  if (!pasta) {
    document.body.innerHTML = "<h2>Pasta não encontrada</h2>";
  } else {
    document.querySelector("h1").innerText = "📁 " + pasta.nome;

    pasta.boletins.forEach((boletim, index) => {
      const div = document.createElement("div");
      div.classList.add("card");

      div.innerHTML = `📄 ${boletim}`;

      div.onclick = () => {
        alert("Abrir: " + boletim);
      };

      container.appendChild(div);
    });
  }
  </script>

</body>
</html>
