<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boletim de Câmera</title>
  <script>
    const temaSalvo = localStorage.getItem("theme");
    if (temaSalvo === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  </script>
  <link rel="stylesheet" href="../css/boletim.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>

<div class="paper">

<div id="boletimExport">

  <h1>BOLETIM DE CÂMERA</h1>

  <button class="back-btn" onclick="history.back()">⬅️</button>
  <button id="toggleHeader">🎬</button>

  <div id="headerContainer">
    <div class="header">
      <div class="header-group">
        <div>FILME: <span contenteditable="true" id="filme"></span></div>
        <div>DATA: <span contenteditable="true" id="data"></span></div>
      </div>

      <div class="header-group">
        <div>FOTO: <span contenteditable="true" id="foto"></span></div>
        <div>PROD: <span contenteditable="true" id="produtora"></span></div>
      </div>

      <div class="header-group">
        <div>ISO: <span contenteditable="true" id="iso"></span></div>
        <div>WB: <span contenteditable="true" id="wb"></span></div>
        <div>FPS: <span contenteditable="true" id="fps"></span></div>
      </div>

      <div class="header-group">
        <div>SHUT: <span contenteditable="true" id="shutter"></span></div>
        <div>RES: <span contenteditable="true" id="resolucao"></span></div>
        <div>CAM: <span contenteditable="true" id="cam"></span></div>
        <div>CARD: <span contenteditable="true" id="card"></span></div>  
      </div>
    </div>
  </div>

  <div class="table-container">

    <div class="actions">
      <button id="addClip" type="button">➕ Clipe</button>
      <button id="addTake" type="button">➕ Take</button>
      <button id="gradeBtn">A</button>
      <button id="exportBtn">...</button>
    </div>

    <div id="exportMenu" class="export-menu">
      <!-- <h3>Exportar</h3> -->
      <button onclick="exportPDF()">📄 Exportar PDF</button>
      <!-- <h3>Compartilhar</h3> -->
      <button onclick="sharePDF()">📄 Compartilhar PDF</button>
      <button onclick="exportImage()">🖼️ Imagem</button>
      <button onclick="saveProject()">📁 Salvar</button>
      <button onclick="shareData()">⤴️ Compartilhar</button>
    </div>

    <div class="stats">
      <div class="stat-box">
        <span class="label">TOTAL</span>
        <span id="total" class="value total">0</span>
      </div>

      <div class="stat-box">
        <span class="label">BOM</span>
        <span id="goodCount" class="value bom">0</span>
      </div>

      <div class="stat-box">
        <span class="label">ÓTIMO</span>
        <span id="bestCount" class="value melhor">0</span>
      </div>

      <div class="stat-box">
        <span class="label">RUIM</span>
        <span id="badCount" class="value ruin">0</span>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>⭐</th>
          <th>CLIPE</th>
          <th>SEQ.</th>
          <th>PLANO</th>
          <th>TAKE</th>
          <th>FILTRO</th>
          <th>LENTE</th>
          <th>DIAF.</th>
          <th>OBS.</th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>
    </table>

  </div>

</div>

<!-- FORA DO TABLE -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Observação</h3>
    <textarea id="modalText"></textarea>
  </div>
</div> 
<script src="../js/theme.js"></script>
<script src="../js/boletim.js"></script>

<!-- EXPORTAR PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</body>
</html>
