<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boletim de Câmera</title>
<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/responsive.css">

</head>

<body>

<div class="paper">

<h1>BOLETIM DE CÂMERA</h1>

<button id="toggleHeader">📋</button>
<button id="toggleTheme">🌙</button>

<div id="headerContainer">
<div class="header">

  <div class="header-group">
    <div>FILME: <span contenteditable="true" id="filme"></span></div>
    <div>DATA: <span contenteditable="true" id="data"></span></div>
  </div>

  <div class="header-group">
    <div>FOTO: <span contenteditable="true" id="foto"></span></div>
    <div>PROD: <span contenteditable="true" id="produtora"></span></div>
  </div>

  <div class="header-group">
    <div>ISO: <span contenteditable="true" id="iso"></span></div>
    <div>WB: <span contenteditable="true" id="wb"></span></div>
    <div>FPS: <span contenteditable="true" id="fps"></span></div>
  </div>

  <div class="header-group">
    <div>SHUT: <span contenteditable="true" id="shutter"></span></div>
    <div>RES: <span contenteditable="true" id="resolucao"></span></div>
    <div>CARD: <span contenteditable="true" id="card"></span></div>
  </div>

</div>
</div>
<div class="table-container">
  <!-- Barra de ações -->
<div class="actions">
  <button id="addTake" type="button">➕ Take</button>
  <button id="addClip" type="button">➕ Clipe</button>
  <button>📤 Exportar</button>
</div>

<!-- Contador de takes -->
<div class="stats">
  <div class="stat-box">
    <span class="label">TOTAL DE TAKES</span>
    <span id="total" class="value total">0</span>
  </div>

  <div class="stat-box">
    <span class="label">BOAS</span>
    <span id="goodCount" class="value bom">0</span>
  </div>

  <div class="stat-box">
    <span class="label">MELHOR</span>
    <span id="bestCount" class="value melhor">0</span>
  </div>

  <div class="stat-box">
    <span class="label">RUINS</span>
    <span id="badCount" class="value ruin">0</span>
  </div>
</div>

<table>
  <thead>
    <tr>
      <th>⭐</th>
      <th>CLIPE</th>
      <th>SEQ.</th>
      <th>PLANO</th>
      <th>TAKE</th>
      <th>FILTRO</th>
      <th>LENTE</th>
      <th>DIAF.</th>
      <th>OBS.</th>
    </tr>
  </thead>

  <tbody id="tableBody">
  <div id="modal" class="modal">
    <div class="modal-content">
      <h3>Observação</h3>
      <textarea id="modalText"></textarea>
     <!-- <button onclick="closeModal()">Salvar</button> --> 
    </div>
  </div>  
  <div id="tooltip" class="tooltip"></div>
  </tbody>
</div>
</table>

</div>
<script src="./js/javascript"></script>

</body>
</html>
